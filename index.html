<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans,'system-ui');font-size:14px;color:var(--color-text-primary);background:var(--color-background-tertiary)}
.app{max-width:900px;margin:0 auto;padding:1.5rem}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:1rem}
.drop-zone{border:1.5px dashed var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:3rem 2rem;text-align:center;cursor:pointer}
.drop-zone:hover{background:var(--color-background-secondary)}
.drop-zone input{display:none}
.log{font-size:12px;font-family:monospace;background:var(--color-background-secondary);padding:12px;border-radius:6px;margin-top:12px;line-height:2;white-space:pre-wrap;max-height:600px;overflow:auto;display:none}
.ok{color:#3B6D11}.err{color:#A32D2D}.info{color:#185FA5}.warn{color:#854F0B}
.tbl-wrap{overflow:auto;max-height:300px;margin-top:12px;border:0.5px solid var(--color-border-tertiary);border-radius:6px;display:none}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--color-background-secondary);padding:6px 10px;text-align:left;font-weight:500;position:sticky;top:0;border-bottom:0.5px solid var(--color-border-tertiary);white-space:nowrap}
td{padding:5px 10px;border-bottom:0.5px solid var(--color-border-tertiary);white-space:nowrap;max-width:150px;overflow:hidden;text-overflow:ellipsis}
</style>
</head>
<body>
<div class="app">
  <div class="card">
    <div class="drop-zone" id="dz" onclick="document.getElementById('fi').click()">
      <input type="file" id="fi" accept=".xlsx,.xls,.csv">
      <div style="font-size:28px;margin-bottom:8px">📊</div>
      <div style="font-weight:500">Cliquez ou glissez votre fichier</div>
      <div style="font-size:12px;color:var(--color-text-secondary);margin-top:4px">.xlsx / .xls / .csv</div>
    </div>
    <div class="log" id="log"></div>
    <div class="tbl-wrap" id="tblWrap"></div>
  </div>
</div>
<script>
function L(msg,cls){
  const el=document.getElementById('log');
  el.style.display='block';
  el.innerHTML+=`<span class="${cls||''}">${msg}</span>\n`;
  el.scrollTop=el.scrollHeight;
}

const dz=document.getElementById('dz');
dz.addEventListener('dragover',e=>e.preventDefault());
dz.addEventListener('drop',e=>{e.preventDefault();go(e.dataTransfer.files[0]);});
document.getElementById('fi').addEventListener('change',e=>go(e.target.files[0]));

function go(file){
  if(!file) return;
  document.getElementById('log').innerHTML='';
  document.getElementById('tblWrap').style.display='none';
  L(`Fichier : ${file.name}  (${(file.size/1024).toFixed(1)} Ko)`,'info');

  const reader=new FileReader();
  reader.onload=ev=>{
    setTimeout(()=>{
      try{
        // Lire avec toutes les options pour débloquer les tableaux structurés
        const wb=XLSX.read(ev.target.result,{
          type:'array',
          cellStyles:false,
          cellDates:false,
          cellNF:false,
          sheetStubs:true,   // inclut les cellules vides
          bookVBA:false
        });

        L(`Feuilles (${wb.SheetNames.length}) : ${wb.SheetNames.join(' | ')}`);

        const wsName=wb.SheetNames[0];
        const ws=wb.Sheets[wsName];

        L(`!ref brut : ${ws['!ref']}`,'info');

        // Inspecter les clés de la feuille
        const keys=Object.keys(ws);
        const cellKeys=keys.filter(k=>!k.startsWith('!'));
        L(`Clés totales dans la feuille : ${keys.length}  (cellules : ${cellKeys.length})`,'info');
        L(`Premières clés : ${cellKeys.slice(0,20).join(', ')}`);
        L(`Dernières clés : ${cellKeys.slice(-10).join(', ')}`);

        // Trouver la vraie plage en scannant toutes les clés de cellules
        let minR=Infinity,maxR=-Infinity,minC=Infinity,maxC=-Infinity;
        cellKeys.forEach(k=>{
          try{
            const d=XLSX.utils.decode_cell(k);
            if(d.r<minR)minR=d.r; if(d.r>maxR)maxR=d.r;
            if(d.c<minC)minC=d.c; if(d.c>maxC)maxC=d.c;
          }catch(e){}
        });
        L(`Plage réelle calculée : R${minR}..R${maxR} × C${minC}..C${maxC}`,'ok');
        L(`= ${maxR-minR+1} lignes × ${maxC-minC+1} colonnes`,'ok');

        // Forcer !ref avec la vraie plage
        const newRef=XLSX.utils.encode_range({s:{r:minR,c:minC},e:{r:maxR,c:maxC}});
        L(`Nouveau !ref forcé : ${newRef}`,'ok');
        ws['!ref']=newRef;

        // Relire avec sheet_to_json
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:false});
        L(`sheet_to_json après correction : ${rows.length} lignes`,'ok');

        if(rows.length>0){
          L(`Ligne 0 : ${JSON.stringify(rows[0]).slice(0,200)}`);
          if(rows.length>1) L(`Ligne 1 : ${JSON.stringify(rows[1]).slice(0,200)}`);
          if(rows.length>2) L(`Ligne 2 : ${JSON.stringify(rows[2]).slice(0,200)}`);
        }

        // Vérifier tableaux structurés (!tables)
        if(ws['!tables']||ws['!autofilter']){
          L(`Tableau structuré détecté : ${JSON.stringify(ws['!tables']||ws['!autofilter']).slice(0,200)}`,'warn');
        }

        // Afficher aperçu si données trouvées
        if(rows.length>1){
          L(`\n✓ Succès — affichage des 20 premières lignes`,'ok');
          showPreview(rows[0], rows.slice(1,21));
        } else {
          L(`\n⚠ Toujours 0 lignes de données — fichier peut-être protégé ou format inhabituel`,'err');
          // Dernier recours : CSV via utils.sheet_to_csv
          const csv=XLSX.utils.sheet_to_csv(ws);
          L(`sheet_to_csv (500 premiers chars) :\n${csv.slice(0,500)}`,'warn');
        }

      }catch(err){
        L('❌ Exception : '+err.message,'err');
        console.error(err);
      }
    },30);
  };
  reader.readAsArrayBuffer(file);
}

function showPreview(hdrs, rows){
  let h='<table><thead><tr>';
  hdrs.forEach(c=>{h+=`<th>${c}</th>`;});
  h+='</tr></thead><tbody>';
  rows.forEach(r=>{
    h+='<tr>';
    hdrs.forEach((_,i)=>{h+=`<td>${r[i]!==undefined?r[i]:''}</td>`;});
    h+='</tr>';
  });
  h+='</tbody></table>';
  const w=document.getElementById('tblWrap');
  w.innerHTML=h; w.style.display='block';
}
</script>
</body></html>
